<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Vạn Thành — Thổi · Trộn · Cắt</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#0f172a; --bg2:#1e293b; --card:#1e293b; --card2:#273449;
  --accent:#14b8a6; --accent2:#0d9488; --text:#e2e8f0; --muted:#94a3b8;
  --border:#334155; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);}
.app{display:flex;min-height:100vh;}
.sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);padding:16px 10px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{font-size:15px;font-weight:700;color:var(--accent);padding:6px 10px 16px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.brand small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:3px;}
.navitem{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13.5px;margin-bottom:3px;transition:.15s;}
.navitem:hover{background:var(--card2);color:var(--text);}
.navitem.active{background:var(--accent);color:#fff;font-weight:600;}
.navitem .cnt{margin-left:auto;background:rgba(255,255,255,.15);padding:1px 7px;border-radius:10px;font-size:11px;}
.main{flex:1;padding:18px 22px;max-width:100%;overflow-x:hidden;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
h1{font-size:19px;margin:0;}
.btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;}
.btn:hover{background:var(--accent2);}
.btn.ghost{background:var(--card2);border:1px solid var(--border);color:var(--text);}
.btn.small{padding:5px 10px;font-size:11.5px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.kpi .v{font-size:20px;font-weight:700;color:var(--accent);}
.kpi .v.bad{color:var(--bad);} .kpi .v.warn{color:var(--warn);} .kpi .v.ok{color:var(--ok);}
.kpi .l{font-size:11.5px;color:var(--muted);margin-top:2px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
.card h3{margin:0 0 10px;font-size:14px;color:var(--text);}
.formhead{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.formhead h3{margin:0;}
.formula{font-size:11px;color:var(--accent);font-weight:400;}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.filters input,.filters select{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 9px;border-radius:6px;font-size:12.5px;}
.tablewrap{overflow:auto;max-height:60vh;border:1px solid var(--border);border-radius:8px;}
table{border-collapse:collapse;width:100%;font-size:12px;white-space:nowrap;}
th{background:var(--card2);position:sticky;top:0;text-align:left;padding:7px 9px;color:var(--accent);border-bottom:1px solid var(--border);z-index:1;}
td{padding:6px 9px;border-bottom:1px solid #2a3850;color:var(--text);}
tr:hover td{background:#22304a;}
.cell-ok{color:var(--ok);font-weight:600;}
.cell-bad{color:var(--bad);font-weight:600;}
.cell-link{color:var(--accent);font-weight:700;cursor:pointer;text-decoration:underline;}
.formgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:10px;max-height:300px;overflow-y:auto;padding-right:6px;}
.formgrid label{font-size:10.5px;color:var(--muted);display:block;margin-bottom:3px;}
.formgrid input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:12px;}
.empty{padding:30px;text-align:center;color:var(--muted);}
.rowdel{color:var(--bad);cursor:pointer;font-weight:700;}
.badge{font-size:10px;background:var(--card2);padding:2px 7px;border-radius:10px;color:var(--muted);}
.badge.ok{background:rgba(34,197,94,.15);color:var(--ok);}
.badge.warn{background:rgba(245,158,11,.15);color:var(--warn);}
.badge.bad{background:rgba(239,68,68,.15);color:var(--bad);}
.editor-meta{font-size:10.5px;color:var(--muted);}
.flow{display:flex;align-items:stretch;gap:10px;flex-wrap:wrap;margin:14px 0;}
.flowstep{flex:1;min-width:160px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.flowstep .t{font-size:12px;color:var(--muted);margin-bottom:6px;}
.flowstep .v{font-size:18px;font-weight:700;color:var(--accent);}
.flowstep .w{font-size:11px;color:var(--bad);margin-top:4px;}
.flowarrow{align-self:center;font-size:20px;color:var(--muted);}
.batchcard{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.batchcard .mh{font-weight:600;font-size:13px;margin-bottom:4px;}
.batchsub{font-size:11.5px;color:var(--muted);margin:3px 0;padding-left:10px;}
.autocomplete{position:relative;}
.aclist{position:absolute;top:100%;left:0;right:0;background:var(--card2);border:1px solid var(--border);border-radius:6px;max-height:200px;overflow-y:auto;z-index:20;}
.acitem{padding:7px 10px;cursor:pointer;font-size:12.5px;}
.acitem:hover{background:var(--accent);color:#fff;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:#475569;border-radius:4px;}
@media(max-width:850px){.app{flex-direction:column;} .sidebar{width:100%;height:auto;position:relative;display:flex;overflow-x:auto;}
.charts{grid-template-columns:1fr;} .flow{flex-direction:column;} .flowarrow{transform:rotate(90deg);}}

.connectScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:20px;}
.connectScreen h2{margin:0;font-size:22px;}
.connectScreen p{color:var(--muted);margin:0 0 10px;max-width:420px;}
.connectScreen input{width:280px;max-width:80vw;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;text-align:center;}
.statusbar{position:fixed;top:10px;right:14px;font-size:11px;background:var(--card2);border:1px solid var(--border);padding:5px 10px;border-radius:20px;color:var(--muted);display:flex;align-items:center;gap:8px;z-index:50;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);}
.dot.bad{background:var(--bad);}

.entry-card{padding:16px;}
.form-section-label{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--accent);letter-spacing:.06em;margin:12px 0 6px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.matgroup{margin-bottom:10px;}
.matgroup-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;}
.matitems{display:flex;flex-direction:column;gap:5px;}
.matrow{display:flex;gap:6px;align-items:center;}
.matrow .matsel{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:12px;}
.matrow .matkg{width:90px;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:12px;}
.btn-icon{background:var(--card2);border:1px solid var(--border);color:var(--accent);padding:5px 9px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;}
.btn-icon.danger{color:var(--bad);}
.btn-icon:hover{background:var(--accent);color:#fff;}
.waste-grid{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px;margin-bottom:4px;}
.waste-label{color:var(--bad)!important;}
.nvl-cell{font-size:10.5px;max-width:180px;white-space:normal;line-height:1.6;}
.waste-cell{font-size:10.5px;max-width:160px;white-space:normal;line-height:1.6;color:var(--bad);}
</style>
</head>

function setStatus(ok,text){
  document.getElementById('statusbar').style.display='flex';

  document.getElementById('statusText').textContent=text;
}
function connectFirebase(){
  const name=document.getElementById('userName').value.trim();
  if(!name){alert('Vui lòng nhập tên');return;}
  userName=name; localStorage.setItem('vt_qc_username',name);
  document.getElementById('connectStatus').textContent='Đang kết nối...';
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    db.ref('.info/connected').on('value',snap=>setStatus(!!snap.val(),snap.val()?'Đã kết nối':'Mất kết nối'));
    seedIfEmptyThenListen();
    document.getElementById('connectScreen').style.display='none';
    document.getElementById('appRoot').style.display='flex';
    document.getElementById('whoami').textContent='👤 '+userName;
  }catch(e){document.getElementById('connectStatus').textContent='❌ '+e.message;}
}
function seedIfEmptyThenListen(){
  TAB_ORDER.forEach(key=>{
    const ref=db.ref('sheets3/'+key);
    ref.once('value').then(snap=>{
      if(!snap.exists()){
        const src=RAW[key]||{headers:[],rows:[]};
        const seed={};
        src.rows.forEach((r,i)=>{seed['r'+i]={vals:r,by:'Excel',ts:Date.now()+i};});
        ref.child('headers').set(src.headers);
        ref.child('rows').set(seed);
      }
      attachListener(key);
    });
  });
  const ref8=db.ref('sheets3/may8');
  ref8.once('value').then(snap=>{
    if(!snap.exists()){
      const seed={};
      MAY8_RAW.records.forEach((rec,i)=>{seed['r'+i]={main:rec.main,batches:rec.batches,by:'Excel',ts:Date.now()+i};});
      ref8.child('headers').set(MAY8_RAW.headers);
      ref8.child('records').set(seed);
    }
    attachListener8();
  });
}
function attachListener(key){
  db.ref('sheets3/'+key).on('value',snap=>{
    const val=snap.val()||{};
    const rowsObj=val.rows||{};
    const rows=Object.keys(rowsObj).map(k=>({id:k,vals:rowsObj[k].vals||[],by:rowsObj[k].by||'',ts:rowsObj[k].ts||0}));
    rows.sort((a,b)=>b.ts-a.ts);
    cache[key]={headers:val.headers||(RAW[key]?.headers)||[],rows};
    render();
  });
}
function attachListener8(){
  db.ref('sheets3/may8').on('value',snap=>{
    const val=snap.val()||{};
    const recObj=val.records||{};
    const records=Object.keys(recObj).map(k=>({id:k,main:recObj[k].main||[],batches:recObj[k].batches||[],by:recObj[k].by||'',ts:recObj[k].ts||0}));

// ============ HELPERS ============
function fmtNum(v){if(v===null||v===undefined||v==='')return '';if(typeof v!=='number')return v;return v.toLocaleString('vi-VN',{maximumFractionDigits:2});}
function num(v){return typeof v==='number'?v:0;}
function wasteSum(cfg,vals){
  if(cfg.wasteTotalCol!=null) return num(vals[cfg.wasteTotalCol]);
  let s=0;(cfg.wasteCols||[]).forEach(wc=>{for(let j=1;j<wc.length;j++) s+=num(vals[wc[j]]);});
  return s;
}
function parseDate(str){
  if(!str) return null;
  const [d,m,y]=String(str).split('/');
  if(!d||!m||!y) return null;
  return new Date(+y,+m-1,+d);
}
function kpiCard(val,label,cls){
  return `<div class="kpi"><div class="v ${cls||''}">${val}</div><div class="l">${label}</div></div>`;
}

function labelOf(cfg,col){
  const obj=cache[current]||{headers:RAW[current]?.headers||[]};
  return (obj.headers[col]||cfg.extraFields?.find(f=>f.col===col)?.label||'col'+col);
}
function renderEntryForm(key,cfg,obj){
  const headers=obj.headers;
  // Basic fields section
  let basicHTML='<div class="formgrid">';
  (cfg.basicFields||[]).forEach(i=>{
    const h=headers[i]||'';
    if(i===cfg.dateCol){
      basicHTML+=`<div><label>${h} *</label><input type="date" id="f_${i}" value="${todayISO()}"></div>`;
    } else {
      const req=(i===cfg.maCol||i===cfg.tenCol)?' *':'';
      basicHTML+=`<div><label>${h}${req}</label><input type="text" id="f_${i}" placeholder="${h}"></div>`;
    }
  });
  basicHTML+='</div>';

  // Material groups (NVL chính, Taical, Hạt màu)
  let matHTML='';
  (cfg.materialGroups||[]).forEach((grp,gi)=>{
    const opts=grp.options.map(o=>`<option value="${o.col}">${o.name}</option>`).join('');
    matHTML+=`<div class="matgroup">
      <div class="matgroup-label">${grp.label}</div>
      <div id="mg_${gi}" class="matitems">
        <div class="matrow">
          <select class="matsel"><option value="">-- Chọn loại --</option>${opts}</select>
          <input type="number" min="0" step="any" value="0" class="matkg" placeholder="kg">
          <button class="btn-icon" onclick="addMatRow(${gi},'${key}',${gi})">＋</button>
        </div>
      </div>
    </div>`;
  });

  // Waste groups (Phế)
  let wasteHTML='';
  if((cfg.wasteGroups||[]).length){
    wasteHTML='<div class="formgrid waste-grid">';
    cfg.wasteGroups.forEach(grp=>{
      grp.options.forEach(o=>{
        wasteHTML+=`<div><label class="waste-label">♻️ ${o.name}</label><input type="number" min="0" step="any" value="0" id="f_${o.col}" placeholder="kg"></div>`;
      });
    });
    wasteHTML+='</div>';
  }
  // Direct waste fields (for tronpe)
  (cfg.wasteFields||[]).forEach(wf=>{
    wasteHTML+=`<div class="inline-field"><label>♻️ ${wf.name}</label><input type="number" min="0" step="any" value="0" id="f_${wf.col}"></div>`;
  });

  // Extra fields
  let extraHTML='<div class="formgrid">';
  (cfg.extraFields||[]).forEach(f=>{
    // skip if already in basicFields
    if((cfg.basicFields||[]).includes(f.col)) return;
    // skip cols covered by material/waste groups
    const allMatCols=(cfg.materialGroups||[]).flatMap(g=>g.options.map(o=>o.col));
    const allWasteCols=(cfg.wasteGroups||[]).flatMap(g=>g.options.map(o=>o.col));
    if(allMatCols.includes(f.col)||allWasteCols.includes(f.col)) return;
    extraHTML+=`<div><label>${f.label||'col'+f.col}</label><input type="number" min="0" step="any" value="0" id="f_${f.col}"></div>`;
  });
  extraHTML+='</div>';

  const hasWaste=wasteHTML.trim().length>0;
  return `<div class="card entry-card">
    <div class="formhead">
      <h3>${cfg.icon} Nhập bản ghi ${cfg.label} mới ${cfg.formula?`<span class="formula">— ${cfg.formula}</span>`:''}  </h3>
      <button class="btn ghost small" onclick="clearForm('${key}')">🧹 Xóa form</button>
    </div>
    <div class="form-section-label">📝 Thông tin cơ bản</div>
    ${basicHTML}
    ${matHTML.length?`<div class="form-section-label">🧱 Nguyên vật liệu</div>${matHTML}`:''}
    ${hasWaste?`<div class="form-section-label">♻️ Phế liệu</div>${wasteHTML}`:''}
    ${extraHTML.replace('<div class="formgrid"></div>','')}
    <button class="btn" style="margin-top:10px;" onclick="addRow('${key}')">💾 Lưu bản ghi</button>
  </div>`;
}

function addMatRow(gi,key,grpIdx){
  const cfg=CONFIGS[key];
  const grp=cfg.materialGroups[grpIdx];
  const opts=grp.options.map(o=>`<option value="${o.col}">${o.name}</option>`).join('');

function clearForm(key){
  const cfg=CONFIGS[key];
  (cfg.basicFields||[]).forEach(i=>{ const el=document.getElementById('f_'+i); if(!el) return; if(el.type==='date') el.value=todayISO(); else el.value=''; });
  (cfg.wasteFields||[]).forEach(wf=>{ const el=document.getElementById('f_'+wf.col); if(el) el.value='0'; });
  (cfg.wasteGroups||[]).forEach(g=>g.options.forEach(o=>{ const el=document.getElementById('f_'+o.col); if(el) el.value='0'; }));
  (cfg.extraFields||[]).forEach(f=>{ const el=document.getElementById('f_'+f.col); if(el) el.value='0'; });
  // reset mat groups to 1 row each
  (cfg.materialGroups||[]).forEach((grp,gi)=>{
    const container=document.getElementById('mg_'+gi); if(!container) return;
    container.querySelectorAll('.matrow').forEach((row,idx)=>{ if(idx===0){row.querySelector('.matsel').value='';row.querySelector('.matkg').value='0';} else row.remove(); });

function addRow(key){
  const cfg=CONFIGS[key];
  const obj=cache[key]||{headers:RAW[key]?.headers||[],rows:[]};
  const nCols=obj.headers.length;
  // init row with nulls
  const row=new Array(nCols).fill(null);

  // basic fields
  (cfg.basicFields||[]).forEach(i=>{
    const el=document.getElementById('f_'+i); if(!el) return;
    if(el.type==='date'){if(!el.value)return; const[y,m,d]=el.value.split('-'); row[i]=`${d}/${m}/${y}`; }
    else{ const v=el.value.trim(); row[i]=v===''?null:v; }
  });
  // validate mã
  if(cfg.maCol!=null&&!row[cfg.maCol]){alert('Vui lòng nhập Mã sản phẩm');return;}

  // material groups → write to correct col indices
  (cfg.materialGroups||[]).forEach((grp,gi)=>{
    const container=document.getElementById('mg_'+gi); if(!container) return;
    container.querySelectorAll('.matrow').forEach(matRow=>{
      const colIdx=Number(matRow.querySelector('.matsel').value);
      const kg=Number(matRow.querySelector('.matkg').value)||0;
      if(!isNaN(colIdx)&&colIdx>=0&&colIdx<nCols) row[colIdx]=kg;
    });
  });

  // waste groups
  (cfg.wasteGroups||[]).forEach(g=>g.options.forEach(o=>{
    const el=document.getElementById('f_'+o.col); if(el&&o.col<nCols) row[o.col]=Number(el.value)||0;
  }));
  // waste direct
  (cfg.wasteFields||[]).forEach(wf=>{ const el=document.getElementById('f_'+wf.col); if(el&&wf.col<nCols) row[wf.col]=Number(el.value)||0; });

  // extra fields
  (cfg.extraFields||[]).forEach(f=>{
    const el=document.getElementById('f_'+f.col); if(!el||f.col>=nCols) return;
    const n=Number(el.value); row[f.col]=isNaN(n)?null:n;
  });

  // auto-calc TOTAL for tronpe: sum cols 6-24 + any sản phẩm phụ
  if(key==='tronpe'){
    let total=0; for(let i=6;i<=35;i++) total+=num(row[i]); row[37]=total;
  }
  // auto-calc Tổng phế for tronphsh
  if(key==='tronphsh'){
    let total=0; for(let i=6;i<=11;i++) total+=num(row[i]); row[13]=total;
  }
  // auto-calc Tổng phế for thoipe
  if(key==='thoipe'){
    let s=0; for(let i=17;i<=27;i++) s+=num(row[i]); row[28]=s;
  }
  // auto-calc Tổng phế for thoiphsh
  if(key==='thoiphsh'){
    let s=0; for(let i=15;i<=18;i++) s+=num(row[i]); row[19]=s;
    row[20]=(num(row[11])||0);
  }
  // auto-calc Tổng phế for cat
  if(key==='cat'){
    let s=0; for(let i=17;i<=20;i++) s+=num(row[i]); row[21]=s;
  }

  db.ref('sheets3/'+key+'/rows').push({vals:row,by:userName,ts:Date.now()});
  clearForm(key);
}

// ============ KPIs ============
function renderKPISection(cfg,rows){
  let klSum=0,klNgSum=0,klInSum=0,wasteTotal=0,caiDat=0;
  rows.forEach(r=>{
    klSum+=num(r.vals[cfg.klCol]);
    if(cfg.klNgCol!=null) klNgSum+=num(r.vals[cfg.klNgCol]);
    if(cfg.klInCol!=null) klInSum+=num(r.vals[cfg.klInCol]);
    if(cfg.caiDatCol!=null) caiDat+=num(r.vals[cfg.caiDatCol]);
    wasteTotal+=wasteSum(cfg,r.vals);
  });
  const base=klInSum>0?klInSum:(klSum+wasteTotal);
  const rate=base>0?(wasteTotal/base*100):0;
  let cards='';
  if(cfg.klInCol!=null) cards+=kpiCard(fmtNum(klInSum)+' kg',cfg.klInLabel||'KL ĐẦU VÀO');
  cards+=kpiCard(fmtNum(klSum)+' kg',cfg.klLabel||'KL ĐẠT','ok');
  if(cfg.klNgCol!=null) cards+=kpiCard(fmtNum(klNgSum)+' kg',cfg.klNgLabel||'KL NG','bad');
  cards+=kpiCard(fmtNum(wasteTotal)+' kg','TỔNG PHẾ','bad');
  cards+=kpiCard(rate.toFixed(2)+'%','TỶ LỆ PHẾ',rate>15?'bad':rate>5?'warn':'ok');
  if(cfg.caiDatCol!=null) cards+=kpiCard(fmtNum(caiDat),'TỔNG CÁI ĐẠT');
  cards+=kpiCard(rows.length,'SỐ BẢN GHI');
  return `<div class="kpis" id="kpiRow">${cards}</div>`;
}

function getFilteredRows(key){

function renderTable(key,cfg,rows){
  if(!rows.length)return'<div class="empty">📭 Không có dữ liệu phù hợp.</div>';
  const headers=cache[key]?.headers||RAW[key]?.headers||[];
  // Determine hidden cols (detail of mat groups & waste groups — shown as summary)
  const allMatCols=(cfg.materialGroups||[]).flatMap(g=>g.options.map(o=>o.col));
  const allWasteDetailCols=[
    ...((cfg.wasteGroups||[]).flatMap(g=>g.options.map(o=>o.col))),
    ...((cfg.wasteFields||[]).map(w=>w.col))
  ];
  // For wasteTotalCol keep it visible; hide individual waste detail cols
  const hiddenCols=new Set([...allMatCols,...allWasteDetailCols]);
  const showCols=headers.map((_,i)=>i).filter(i=>!hiddenCols.has(i));
  const hasNvl=allMatCols.length>0;
  const hasWasteGrp=allWasteDetailCols.length>0;
  let thead='<tr><th>#</th>'+showCols.map(i=>{
    let h=headers[i]||'';
    if(i===cfg.wasteTotalCol)h='Tổng phế';
    return `<th title="${h}">${h.length>14?h.slice(0,13)+'…':h}</th>`;
  }).join('');
  if(hasNvl) thead+='<th>NVL chính</th>';
  if(hasWasteGrp) thead+='<th>Chi tiết phế</th>';
  thead+='<th>%Phế</th><th>Người nhập</th><th></th></tr>';
  let tbody=rows.map((o,i)=>{
    const w=wasteSum(cfg,o.vals);
    const base=cfg.klInCol!=null?num(o.vals[cfg.klInCol]):(num(o.vals[cfg.klCol])+w);
    const pct=base>0?(w/base*100):0;const pctCls=pct>15?'bad':pct>5?'warn':'ok';
    const tds=showCols.map(ci=>{
      const v=o.vals[ci];let cls='';
      if(ci===cfg.klCol)cls='cell-ok';
      else if(ci===cfg.klNgCol||(cfg.wasteTotalCol!=null&&ci===cfg.wasteTotalCol))cls='cell-bad';
      else if(ci===cfg.maCol)cls='cell-link';
      const oc=ci===cfg.maCol?`onclick="openMaReport('${String(v||'').replace(/'/g,"\'")}')"`:'' ;
      return `<td class="${cls}" ${oc}>${v===null||v===undefined||v===''?'':(typeof v==='number'?fmtNum(v):v)}</td>`;
    }).join('');
    // NVL summary column
    let nvlCell='';
    if(hasNvl){
      const parts=(cfg.materialGroups||[]).flatMap(grp=>
        grp.options.filter(o2=>num(o.vals[o2.col])>0)
          .map(o2=>`<span style="color:var(--text)">${o2.name}</span>: <b>${fmtNum(num(o.vals[o2.col]))}</b>kg`)
      );
      nvlCell=`<td class="nvl-cell">${parts.join('<br>')||'—'}</td>`;
    }
    // Waste detail summary column
    let wasteCell='';
    if(hasWasteGrp){
      const parts=(cfg.wasteGroups||[]).flatMap(grp=>
        grp.options.filter(o2=>num(o.vals[o2.col])>0)
          .map(o2=>`<span style="color:var(--muted)">${o2.name}</span>: <b style="color:var(--bad)">${fmtNum(num(o.vals[o2.col]))}</b>kg`)
      );
      wasteCell=`<td class="waste-cell">${parts.join('<br>')||'—'}</td>`;
    }
    return `<tr><td>${i+1}</td>${tds}${nvlCell}${wasteCell}<td><span class="badge ${pctCls}">${pct.toFixed(2)}%</span></td><td><span class="badge">${o.by||''}</span></td><td><span class="rowdel" onclick="delRow('${key}','${o.id}')">✕</span></td></tr>`;
  }).join('');
  return `<div class="tablewrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

function computeFlow(ma,fromStr,toStr){
  if(!ma)return'';
  const tronPE=filterRowsByMaDate('tronpe',ma,fromStr,toStr);
  const tronPH=filterRowsByMaDate('tronphsh',ma,fromStr,toStr);
  const thoiPE=filterRowsByMaDate('thoipe',ma,fromStr,toStr);
  const thoiPH=filterRowsByMaDate('thoiphsh',ma,fromStr,toStr);
  const catRows=filterRowsByMaDate('cat',ma,fromStr,toStr);
  const st=sumRows('tronpe',tronPE),sp=sumRows('tronphsh',tronPH),ht=sumRows('thoipe',thoiPE),hp=sumRows('thoiphsh',thoiPH),c=sumRows('cat',catRows);
  const total=st.count+sp.count+ht.count+hp.count+c.count;
  if(total===0)return'<div class="empty">📭 Không tìm thấy dữ liệu cho mã hàng này.</div>';
  const tronKg=st.kl+sp.kl,thoiKg=ht.kl+hp.kl,thoiW=ht.waste+hp.waste,catKg=c.kl,catW=c.waste;
  const hh1=tronKg>0?(100-thoiKg/tronKg*100):null;const hh2=thoiKg>0?(100-catKg/thoiKg*100):null;
  const tabDetail=(key,rows,label,icon)=>{
    if(!rows.length)return'';
    const cfg=CONFIGS[key];const headers=cache[key]?.headers||[];
    const allMatCols=(cfg.materialGroups||[]).flatMap(g=>g.options.map(o=>o.col));
    const hiddenCols=new Set(allMatCols);
    const showCols=headers.map((_,i)=>i).filter(i=>!hiddenCols.has(i));
    const tds=rows.map((o,i)=>{
      const w=wasteSum(cfg,o.vals);const base=cfg.klInCol!=null?num(o.vals[cfg.klInCol]):(num(o.vals[cfg.klCol])+w);
      const pct=base>0?(w/base*100):0;const pctCls=pct>15?'bad':pct>5?'warn':'ok';
      const cells=showCols.map(ci=>`<td>${o.vals[ci]===null||o.vals[ci]===undefined?'':(typeof o.vals[ci]==='number'?fmtNum(o.vals[ci]):o.vals[ci])}</td>`).join('');
      const allWDC=(cfg.wasteGroups||[]).flatMap(g=>g.options.map(x=>x.col));
      const hasWG=allWDC.length>0;
      let nvl='';if(allMatCols.length){const parts=(cfg.materialGroups||[]).flatMap(g=>g.options.filter(o2=>num(o.vals[o2.col])>0).map(o2=>`<span style="color:var(--muted)">${o2.name}</span>: <b>${fmtNum(num(o.vals[o2.col]))}</b>kg`));nvl=`<td class="nvl-cell">${parts.join('<br>')||'—'}</td>`;}
      let wCell='';if(hasWG){const wparts=(cfg.wasteGroups||[]).flatMap(g=>g.options.filter(o2=>num(o.vals[o2.col])>0).map(o2=>`<span style="color:var(--muted)">${o2.name}</span>: <b style="color:var(--bad)">${fmtNum(num(o.vals[o2.col]))}</b>kg`));wCell=`<td class="waste-cell">${wparts.join('<br>')||'—'}</td>`;}
      return `<tr><td>${i+1}</td>${cells}${nvl}${wCell}<td><span class="badge ${pctCls}">${pct.toFixed(2)}%</span></td></tr>`;
    }).join('');
    const sum=sumRows(key,rows);
    const allWGCols2=(cfg.wasteGroups||[]).flatMap(g=>g.options.map(x=>x.col));
    const headerRow='<tr><th>#</th>'+showCols.map(i=>{let h=headers[i]||'';return`<th title="${h}">${h.length>14?h.slice(0,13)+'…':h}</th>`;}).join('')+(allMatCols.length?'<th>NVL chính</th>':'')+(allWGCols2.length?'<th>Chi tiết phế</th>':'')+'<th>%Phế</th></tr>';
    return `<div class="card"><h3>${icon} ${label} — ${rows.length} bản ghi | KL: <span style="color:var(--ok)">${fmtNum(sum.kl)} kg</span> | Phế: <span style="color:var(--bad)">${fmtNum(sum.waste)} kg</span></h3><div class="tablewrap"><table><thead>${headerRow}</thead><tbody>${tds}</tbody></table></div></div>`;
  };
  return `
  <div class="flow">
    <div class="flowstep"><div class="t">🧪 TRỘN NL</div><div class="v">${fmtNum(tronKg)} kg</div><div class="editor-meta">${st.count+sp.count} phiếu</div></div>
    <div class="flowarrow">→</div>
    <div class="flowstep"><div class="t">🌬️ THỔI</div><div class="v">${fmtNum(thoiKg)} kg</div><div class="w">Phế: ${fmtNum(thoiW)} kg</div><div class="editor-meta">${ht.count+hp.count} dòng</div></div>
    <div class="flowarrow">→</div>
    <div class="flowstep"><div class="t">✂️ CẮT</div><div class="v">${fmtNum(catKg)} kg</div><div class="w">Phế: ${fmtNum(catW)} kg</div><div class="editor-meta">${c.count} dòng</div></div>
  </div>
  <div class="kpis">
    ${kpiCard(hh1!==null?hh1.toFixed(2)+'%':'—','Hao hụt Trộn→Thổi',hh1&&hh1>10?'bad':hh1&&hh1>5?'warn':'ok')}
    ${kpiCard(hh2!==null?hh2.toFixed(2)+'%':'—','Hao hụt Thổi→Cắt',hh2&&hh2>10?'bad':hh2&&hh2>5?'warn':'ok')}
    ${kpiCard(fmtNum(thoiW+catW)+' kg','Tổng phế Thổi+Cắt','bad')}
    ${kpiCard(total,'Tổng bản ghi liên quan')}
  </div>
  <div class="charts">
    <div class="card"><h3>📊 So sánh KL & Phế theo công đoạn (kg)</h3><canvas id="lkChartBar" height="200"></canvas></div>
    <div class="card"><h3>📈 KL đạt qua từng ngày</h3><canvas id="lkChartLine" height="200"></canvas></div>
  </div>
  ${tabDetail('tronpe',tronPE,'Trộn NL PE','🧪')}
  ${tabDetail('tronphsh',tronPH,'Trộn NL PHSH','🌱')}
  ${tabDetail('thoipe',thoiPE,'Thổi túi PE','🌬️')}
  ${tabDetail('thoiphsh',thoiPH,'Thổi PHSH','🍃')}
  ${tabDetail('cat',catRows,'Cắt','✂️')}`;
}
function drawLookupCharts(ma,fromStr,toStr){
  lookupCharts.forEach(c=>c.destroy());lookupCharts=[];
  const barEl=document.getElementById('lkChartBar');const lineEl=document.getElementById('lkChartLine');
  if(!barEl||!lineEl)return;
  const tronPE=filterRowsByMaDate('tronpe',ma,fromStr,toStr),tronPH=filterRowsByMaDate('tronphsh',ma,fromStr,toStr);
  const thoiPE=filterRowsByMaDate('thoipe',ma,fromStr,toStr),thoiPH=filterRowsByMaDate('thoiphsh',ma,fromStr,toStr);
  const catRows=filterRowsByMaDate('cat',ma,fromStr,toStr);
  const st=sumRows('tronpe',tronPE),sp=sumRows('tronphsh',tronPH),ht=sumRows('thoipe',thoiPE),hp=sumRows('thoiphsh',thoiPH),c=sumRows('cat',catRows);
  const c1=new Chart(barEl,{type:'bar',data:{labels:['Trộn PE','Trộn PHSH','Thổi PE','Thổi PHSH','Cắt'],datasets:[{label:'KL đạt (kg)',data:[st.kl,sp.kl,ht.kl,hp.kl,c.kl],backgroundColor:['#14b8a6','#0d9488','#6366f1','#818cf8','#22c55e']},{label:'Phế (kg)',data:[st.waste,sp.waste,ht.waste,hp.waste,c.waste],backgroundColor:'#ef4444'}]},options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{size:10}}}},scales:{x:{ticks:{color:'#94a3b8'}},y:{ticks:{color:'#94a3b8'}}}}});
  const allByDate={};
  const addD=(rows,key)=>rows.forEach(r=>{const cfg=CONFIGS[key];const d=cfg.dateCol!=null?(r.vals[cfg.dateCol]||'?'):'?';if(!allByDate[d])allByDate[d]={kl:0,waste:0};allByDate[d].kl+=num(r.vals[cfg.klCol]);allByDate[d].waste+=wasteSum(cfg,r.vals);});
  addD(tronPE,'tronpe');addD(tronPH,'tronphsh');addD(thoiPE,'thoipe');addD(thoiPH,'thoiphsh');addD(catRows,'cat');
  const dates=Object.keys(allByDate).filter(x=>x!=='?').sort((a,b)=>a.split('/').reverse().join('').localeCompare(b.split('/').reverse().join('')));
  const c2=new Chart(lineEl,{type:'line',data:{labels:dates,datasets:[{label:'KL đạt (kg)',data:dates.map(d=>allByDate[d].kl.toFixed(2)),borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.1)',tension:0.3,fill:true},{label:'Phế (kg)',data:dates.map(d=>allByDate[d].waste.toFixed(2)),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.1)',tension:0.3,fill:true}]},options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{size:10}}}},scales:{x:{ticks:{color:'#94a3b8',font:{size:9}}},y:{ticks:{color:'#94a3b8'}}}}});
  lookupCharts.push(c1,c2);
}

// ============ DASHBOARD ============
function renderDashboard(){
  const m8=(may8cache?.records.length)||0;let totalRows=m8;TAB_ORDER.forEach(k=>totalRows+=(cache[k]?.rows.length)||0);
  let catKg=0,catW=0,thoiKg=0,tronKg=0;
  (cache['cat']?.rows||[]).forEach(r=>{catKg+=num(r.vals[CONFIGS['cat'].klCol]);catW+=wasteSum(CONFIGS['cat'],r.vals);});
  (cache['thoipe']?.rows||[]).forEach(r=>thoiKg+=num(r.vals[CONFIGS['thoipe'].klCol]));
  (cache['tronpe']?.rows||[]).forEach(r=>tronKg+=num(r.vals[CONFIGS['tronpe'].klCol]));
  return `<div class="kpis">${kpiCard(totalRows,'Tổng số bản ghi (7 sổ)')}${kpiCard(fmtNum(tronKg)+' kg','Tổng kg — Trộn NL PE','ok')}${kpiCard(fmtNum(thoiKg)+' kg','Tổng kg — Thổi túi PE','ok')}${kpiCard(fmtNum(catKg)+' kg','Tổng kg đạt — Cắt','ok')}</div>
  <div class="charts"><div class="card"><h3>📊 Số bản ghi theo sổ</h3><canvas id="chBars" height="200"></canvas></div><div class="card"><h3>🥧 Tỷ trọng dữ liệu theo công đoạn</h3><canvas id="chPie" height="200"></canvas></div></div>
  <div class="card"><h3>📁 Danh sách sổ dữ liệu</h3><div class="tablewrap"><table><thead><tr><th>Sổ dữ liệu</th><th>Số cột</th><th>Số dòng</th><th></th></tr></thead><tbody>
  ${TAB_ORDER.map(k=>{const cfg=CONFIGS[k];const obj=cache[k]||{headers:[],rows:[]};return`<tr><td>${cfg.icon} ${cfg.label}</td><td>${obj.headers.length}</td><td>${obj.rows.length}</td><td><span class="badge" style="cursor:pointer" onclick="goto('${k}')">Mở →</span></td></tr>`;}).join('')}
  <tr><td>⚙️ Máy 8 - Túi rác đen</td><td>—</td><td>${m8}</td><td><span class="badge" style="cursor:pointer" onclick="goto('may8')">Mở →</span></td></tr>
  </tbody></table></div></div>`;
}
function drawDashCharts(){
  dashCharts.forEach(c=>c.destroy());dashCharts=[];
  const m8=(may8cache?.records.length)||0;
  const labels=TAB_ORDER.map(k=>CONFIGS[k].label).concat(['Máy 8']);
  const counts=TAB_ORDER.map(k=>(cache[k]?.rows.length)||0).concat([m8]);
  const colors=['#14b8a6','#f59e0b','#6366f1','#22c55e','#ef4444','#06b6d4','#a855f7'];
  const b=document.getElementById('chBars'),p=document.getElementById('chPie');if(!b||!p)return;
  dashCharts.push(new Chart(b,{type:'bar',data:{labels,datasets:[{label:'Bản ghi',data:counts,backgroundColor:colors}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8',font:{size:10}}},y:{ticks:{color:'#94a3b8'}}}}}),new Chart(p,{type:'doughnut',data:{labels,datasets:[{data:counts,backgroundColor:colors}]},options:{plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:10}}}}}}));
}

window.addEventListener('DOMContentLoaded',()=>{const saved=localStorage.getItem('vt_qc_username');if(saved)document.getElementById('userName').value=saved;});

</script>
